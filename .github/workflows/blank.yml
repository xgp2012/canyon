# 工作流名称
name: Java 8 Build, Test and Package

# 触发条件：推送到main分支/创建PR时触发
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-package:
    runs-on: ubuntu-latest

    steps:
      # 步骤1：检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 步骤2：配置Java 8环境（缓存Maven依赖）
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: 'maven'

      # 步骤3：编译、测试并打包生成JAR（核心步骤）
      - name: Build and package with Maven
        run: |
          # package命令会自动完成编译、测试、打包（生成JAR）
          # -B：批处理模式，-DskipTests可选（如需跳过测试则添加）
          mvn -B clean package --file pom.xml

      # 步骤4：上传JAR包产物（关键：保存打包后的文件）
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: java8-project-jar
          # 匹配target目录下所有jar文件（包含可执行jar）
          path: |
            target/*.jar
            # 排除测试相关的jar（可选，按需保留）
            !target/*-tests.jar
            !target/*-test.jar
          retention-days: 30  # 产物保留30天，可按需调整
