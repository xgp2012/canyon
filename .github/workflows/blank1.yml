name: Canyon Build (Java 8)

# 支持手动触发
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code (递归克隆子模块，必须！)
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'  # 关键：克隆所有子项目
          fetch-depth: 0

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      # 官方第一步：运行 canyon p 命令
      - name: Run canyon prepare
        run: chmod +x canyon && ./canyon p

      # 官方第二步：构建
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 上传真正的可运行服务器jar！
      - name: Upload Canyon Server JAR
        uses: actions/upload-artifact@v4
        with:
          name: Canyon-Server-JAR
          path: Canyon-Server/target/*.jar
