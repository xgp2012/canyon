# 工作流名称
name: Java 8 Build, Test and Package

# 触发条件：手动触发 + 原有自动触发（push/PR）
on:
  # 核心：添加手动触发配置
  workflow_dispatch:
  # 保留原有自动触发规则（如需仅保留手动触发，可删除以下两行）
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-package:
    runs-on: ubuntu-latest

    steps:
      # 步骤1：检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 步骤2：配置Java 8环境（缓存Maven依赖）
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: 'maven'

      # 步骤3：编译、测试并打包生成JAR
      - name: Build and package with Maven
        run: |
          # package命令生成JAR，-DskipTests可选（跳过测试）
          mvn -B clean package --file pom.xml

      # 步骤4：上传JAR产物
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: java8-project-jar
          path: |
            target/*.jar
            !target/*-tests.jar
            !target/*-test.jar
          retention-days: 30  # 产物保留30天
